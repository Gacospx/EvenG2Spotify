<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Callback</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #121212; color: #fff; }
    p { font-size: 1rem; opacity: 0.7; }
  </style>
</head>
<body>
  <p id="msg">Spotify 認証中...</p>
  <script>
    const search = window.location.search  // ?code=...&state=...

    if (!search) {
      document.getElementById('msg').textContent = 'パラメータがありません。アプリから認証を開始してください。'
    } else {
      const usp = new URLSearchParams(search)
      const code  = usp.get('code')
      const error = usp.get('error')
      const stateVal = usp.get('state') ?? ''

      // state からアプリのオリジンを取り出す。
      // 新フォーマット: "verifier~encodedOrigin~encodedClientId~encodedRedirectUri"
      // 旧フォーマット: "verifier.encodedOrigin"
      let appOrigin = window.location.origin  // フォールバック
      try {
        if (stateVal.includes('~')) {
          const parts = stateVal.split('~')
          if (parts[1]) appOrigin = decodeURIComponent(parts[1])
        } else {
          const dot = stateVal.indexOf('.')
          if (dot !== -1) appOrigin = decodeURIComponent(stateVal.slice(dot + 1))
        }
      } catch { /* stateが不正な場合はフォールバックを使用 */ }

      if (error) {
        document.getElementById('msg').textContent = '認証エラー: ' + error
      } else if (code && stateVal) {
        // ── 方法1: postMessage（ポップアップフロー / Electron 内部 WebView）──
        // Even Hub は window.open() を内部 BrowserWindow で処理するため
        // window.opener が有効 → メッセージ送信でページ遷移不要
        let handled = false
        if (window.opener) {
          try {
            window.opener.postMessage(
              { spotifyCode: code, spotifyState: stateVal },
              '*'
            )
            document.getElementById('msg').textContent = '認証完了！アプリに戻ってください。'
            setTimeout(() => { try { window.close() } catch {} }, 2000)
            handled = true
          } catch { /* fall through to redirect */ }
        }

        // ── 方法2: リダイレクト（フォールバック / dev サーバーなど）──
        if (!handled) {
          window.location.replace(appOrigin + search)
        }
      } else {
        document.getElementById('msg').textContent = 'コードが見つかりません。アプリから認証を開始してください。'
      }
    }
  </script>
</body>
</html>
