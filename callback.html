<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Callback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #121212; color: #fff;
    }
    .card { text-align: center; padding: 40px 28px; max-width: 400px; width: 90%; }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    .sub { font-size: 0.88rem; opacity: 0.6; line-height: 1.7; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Spotify 認証中...</h1>
    <p class="sub" id="sub">トークンを取得しています...</p>
  </div>
  <script>
    const iconEl  = document.getElementById('icon')
    const titleEl = document.getElementById('title')
    const subEl   = document.getElementById('sub')

    function showError(msg) {
      iconEl.textContent  = '❌'
      titleEl.textContent = '認証エラー'
      titleEl.classList.add('error')
      subEl.textContent   = msg
    }

    const usp      = new URLSearchParams(window.location.search)
    const code     = usp.get('code')
    const error    = usp.get('error')
    const stateVal = usp.get('state') ?? ''

    // state パース
    // 新フォーマット: verifier~encodedOrigin~encodedClientId~encodedRedirectUri
    // 旧フォーマット: verifier.encodedOrigin
    let appOrigin   = window.location.origin
    let verifier    = ''
    let clientId    = ''
    let redirectUri = window.location.href.split('?')[0]
    try {
      if (stateVal.includes('~')) {
        const p = stateVal.split('~')
        verifier    = p[0] ?? ''
        if (p[1]) appOrigin   = decodeURIComponent(p[1])
        if (p[2]) clientId    = decodeURIComponent(p[2])
        if (p[3]) redirectUri = decodeURIComponent(p[3])
      } else {
        const dot = stateVal.indexOf('.')
        verifier = dot !== -1 ? stateVal.slice(0, dot) : stateVal
        if (dot !== -1) appOrigin = decodeURIComponent(stateVal.slice(dot + 1))
      }
    } catch {}

    if (!code && !error) {
      showError('パラメータがありません。アプリから認証を開始してください。')
    } else if (error) {
      showError('Spotify 認証エラー: ' + error)
    } else {
      ;(async () => {
        if (!verifier || !clientId) {
          showError('認証情報が不完全です。アプリから再度お試しください。')
          return
        }
        try {
          const res = await fetch('https://accounts.spotify.com/api/token', {
            method:  'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              grant_type:    'authorization_code',
              code,
              redirect_uri:  redirectUri,
              client_id:     clientId,
              code_verifier: verifier,
            }),
          })
          if (!res.ok) throw new Error('HTTP ' + res.status)
          const data = await res.json()

          const tokens = {
            accessToken:  data.access_token,
            refreshToken: data.refresh_token,
            expiresAt:    Date.now() + data.expires_in * 1000,
            clientId,
          }
          const tokensJson = JSON.stringify(tokens)

          iconEl.textContent  = '✅'
          titleEl.textContent = '認証完了！'
          subEl.textContent   = 'アプリに戻っています...'

          // ── 方法1: flutter_inappwebview bridge でネイティブストレージに書き込む ──
          // Even Hub bridge が popup WebView でも登録されていれば、
          // メイン WebView の bridge.getLocalStorage で読み出せる
          if (window.flutter_inappwebview) {
            try {
              await window.flutter_inappwebview.callHandler(
                'evenAppMessage',
                JSON.stringify({
                  type:   'call_even_app_method',
                  method: 'setLocalStorage',
                  params: { key: 'spotify_oauth_tokens', value: tokensJson },
                })
              )
            } catch {}
          }

          // ── 方法2: postMessage でメイン WebView に直接送信 ──
          // flutter_inappwebview は postMessage データを JSON 文字列にシリアライズする場合がある
          // メイン WebView 側では文字列・オブジェクト両方を受け入れる
          if (window.opener) {
            try {
              // オブジェクト形式（通常のブラウザ向け）
              window.opener.postMessage({ spotifyTokens: tokens }, '*')
              // 文字列形式（flutter_inappwebview 向けの冗長送信）
              window.opener.postMessage(tokensJson, '*')
            } catch {}
          }

          // ── 方法3: appOrigin + hash にナビゲート ──
          // Even Hub がこのナビゲーションを検出してポップアップを閉じるか、
          // アプリが hash からトークンを読み出す
          setTimeout(() => {
            const hash = '#spotify_tokens=' + encodeURIComponent(tokensJson)
            try {
              window.location.replace(appOrigin + hash)
            } catch {
              subEl.textContent = 'アプリに手動で戻ってください。'
            }
          }, 300)

        } catch (err) {
          showError('トークン取得に失敗しました: ' + (err?.message ?? String(err)))
        }
      })()
    }
  </script>
</body>
</html>
