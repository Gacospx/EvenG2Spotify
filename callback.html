<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Callback</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #121212; color: #fff; }
    p { font-size: 1rem; opacity: 0.7; }
  </style>
</head>
<body>
  <p id="msg">Spotify 認証中...</p>
  <script>
    // ────────────────────────────────────────────────
    // デプロイ前にここだけ書き換える:
    // Even G2 Spotify アプリが動いている URL（末尾スラッシュなし）
    // ────────────────────────────────────────────────
    const APP_URL = 'http://localhost:5182'
    // ────────────────────────────────────────────────

    const params = window.location.search   // ?code=... または ?error=...

    if (!params) {
      document.getElementById('msg').textContent = 'パラメータがありません。アプリから認証を開始してください。'
    } else {
      window.location.replace(APP_URL + params)
    }
  </script>
</body>
</html>
