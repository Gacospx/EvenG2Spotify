<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Callback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #121212; color: #fff;
    }
    .card { text-align: center; padding: 40px 28px; max-width: 400px; width: 90%; }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    .sub { font-size: 0.88rem; opacity: 0.6; line-height: 1.7; margin-bottom: 28px; }
    .hint {
      font-size: 0.82rem; background: #1e1e1e; border-radius: 8px;
      padding: 12px 16px; line-height: 1.8; opacity: 0.75; margin-bottom: 20px;
    }
    .hint strong { opacity: 1; color: #1db954; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Spotify 認証中...</h1>
    <p class="sub" id="sub"></p>
    <div class="hint" id="hint" style="display:none"></div>
  </div>

  <script>
    const iconEl  = document.getElementById('icon')
    const titleEl = document.getElementById('title')
    const subEl   = document.getElementById('sub')
    const hintEl  = document.getElementById('hint')

    const search   = window.location.search
    const usp      = new URLSearchParams(search)
    const code     = usp.get('code')
    const error    = usp.get('error')
    const stateVal = usp.get('state') ?? ''

    // state からアプリのオリジンを取り出す
    // 新フォーマット: verifier~encodedOrigin~...  旧: verifier.encodedOrigin
    let appOrigin = window.location.origin
    try {
      if (stateVal.includes('~')) {
        const p = stateVal.split('~')
        if (p[1]) appOrigin = decodeURIComponent(p[1])
      } else {
        const dot = stateVal.indexOf('.')
        if (dot !== -1) appOrigin = decodeURIComponent(stateVal.slice(dot + 1))
      }
    } catch {}

    if (!search || (!code && !error)) {
      iconEl.textContent  = '❌'
      titleEl.textContent = 'エラー'
      subEl.textContent   = 'パラメータがありません。アプリから認証を開始してください。'
    } else if (error) {
      iconEl.textContent  = '❌'
      titleEl.textContent = '認証エラー'
      titleEl.classList.add('error')
      subEl.textContent   = error
    } else if (code && stateVal) {

      if (window.opener) {
        // ── ポップアップフロー（Electron / Even Hub 内部 WebView）
        try {
          window.opener.postMessage({ spotifyCode: code, spotifyState: stateVal }, '*')

          iconEl.textContent  = '✅'
          titleEl.textContent = '認証完了！'
          subEl.textContent   = 'アプリに戻っています...'

          // postMessage の処理完了を待ってからアプリに戻る
          // window.close() はモバイルでは動作しないため、アプリのオリジンへナビゲート
          setTimeout(() => {
            try {
              window.location.replace(appOrigin)
            } catch {
              // ナビゲートできない場合は手動案内を表示
              subEl.textContent    = '自動で戻れませんでした。'
              hintEl.style.display = ''
              hintEl.innerHTML     =
                '<strong>Android:</strong> 画面左上の「 ← 」をタップ<br>' +
                '<strong>iOS:</strong> 画面左上の「完了」をタップ<br>してアプリに戻ってください。'
            }
          }, 800)

        } catch {
          // postMessage 失敗 → リダイレクトにフォールバック
          window.location.replace(appOrigin + search)
        }

      } else {
        // ── リダイレクトフォールバック（opener なし）
        window.location.replace(appOrigin + search)
      }

    }
  </script>
</body>
</html>
