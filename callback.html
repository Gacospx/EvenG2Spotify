<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Callback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #121212; color: #fff;
    }
    .card {
      text-align: center; padding: 40px 32px; max-width: 420px; width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.3rem; margin-bottom: 8px; }
    p { font-size: 0.9rem; opacity: 0.65; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 12px 28px; border-radius: 8px; border: none;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      background: #1db954; color: #000; transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1 id="title">Spotify 認証中...</h1>
    <p id="msg"></p>
  </div>

  <script>
    const titleEl = document.getElementById('title')
    const msgEl   = document.getElementById('msg')
    const cardEl  = document.getElementById('card')

    function showSuccess() {
      titleEl.textContent = '認証完了！'
      msgEl.textContent   = 'Even Hub のアプリに認証情報を送信しました。このウィンドウを閉じて Even Hub に戻ってください。'
      cardEl.querySelector('.icon').textContent = '✅'

      // 閉じるボタン
      const btn = document.createElement('button')
      btn.className   = 'btn'
      btn.textContent = 'このウィンドウを閉じる'
      btn.onclick = () => { try { window.close() } catch {} }
      cardEl.appendChild(btn)

      // opener にフォーカスを戻す
      try { if (window.opener) window.opener.focus() } catch {}
      // 自動クローズを試みる（環境によって動作しないことがある）
      try { window.close() } catch {}
    }

    function showError(text) {
      titleEl.textContent = '認証エラー'
      titleEl.classList.add('error')
      msgEl.textContent = text
      cardEl.querySelector('.icon').textContent = '❌'
    }

    function showFallback(appOrigin, search) {
      // postMessage が使えない場合はリダイレクト
      window.location.replace(appOrigin + search)
    }

    const search = window.location.search
    if (!search) {
      showError('パラメータがありません。アプリから認証を開始してください。')
    } else {
      const usp      = new URLSearchParams(search)
      const code     = usp.get('code')
      const error    = usp.get('error')
      const stateVal = usp.get('state') ?? ''

      // state からアプリのオリジンを取り出す
      // 新フォーマット: verifier~encodedOrigin~encodedClientId~encodedRedirectUri
      // 旧フォーマット: verifier.encodedOrigin
      let appOrigin = window.location.origin
      try {
        if (stateVal.includes('~')) {
          const parts = stateVal.split('~')
          if (parts[1]) appOrigin = decodeURIComponent(parts[1])
        } else {
          const dot = stateVal.indexOf('.')
          if (dot !== -1) appOrigin = decodeURIComponent(stateVal.slice(dot + 1))
        }
      } catch {}

      if (error) {
        showError('Spotify 認証エラー: ' + error)
      } else if (code && stateVal) {
        // ── 方法1: postMessage（ポップアップフロー / Electron 内部 WebView）
        if (window.opener) {
          try {
            window.opener.postMessage({ spotifyCode: code, spotifyState: stateVal }, '*')
            showSuccess()
          } catch {
            showFallback(appOrigin, search)
          }
        } else {
          // ── 方法2: リダイレクト（フォールバック）
          showFallback(appOrigin, search)
        }
      } else {
        showError('コードが見つかりません。アプリから認証を開始してください。')
      }
    }
  </script>
</body>
</html>
